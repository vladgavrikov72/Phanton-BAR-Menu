{"CATS":[{"id":"cocktails","title":"Коктейли бара","type":"c","sub":"Авторские позиции бара и переосмысленная классика — то, с чего гость чаще всего начинает вечер."},{"id":"tinder","title":"Коктейльный тиндер","type":"c","sub":"Игровой раздел меню: два классических коктейля «на свидании» в одном бокале — хорошая тема для лёгкой беседы с гостем."},{"id":"seasonal","title":"Сезонные напитки","type":"c","sub":"Сезонная витрина бара — ярче по подаче, часто без крепкой доминанты."},{"id":"nonalc","title":"Б/А коктейли","type":"c","sub":"Безалкогольные версии узнаваемой классики — для гостей за рулём или не пьющих алкоголь."},{"id":"lemonade","title":"Лимонады","type":"c","sub":"Домашние безалкогольные лимонады собственного производства."},{"id":"tinctures","title":"Настойки","type":"c","sub":"Русская традиция настаивания водки на ягодах, травах и специях — без перегонки, чистое мацерирование."},{"id":"beer","title":"Пиво","type":"s","sub":"Импортное и крафтовое пиво разных стилей.","primer":"Эль (верхнее брожение) — фруктовый, подаётся чуть теплее; лагер (нижнее брожение) — чистый, хрустящий, подаётся холодным. Витбир и абве — отдельные монастырские традиции со своими пряностями."},{"id":"port","title":"Порто и херес","type":"s","sub":"Крепленые вина Пиренейского полуострова.","primer":"Крепленое вино — спирт добавляют в вино до или после брожения. <b>Херес</b> чаще сухой (Фино), <b>портвейн</b> почти всегда сладкий (Руби, Уайт)."},{"id":"liqueurs","title":"Ликёры и дижестивы","type":"s","sub":"Травяные биттеры и дижестивы — то, что традиционно подают после еды.","primer":"Шкала горечи важнее шкалы крепости: от мягких травяных и ореховых (Монтенегро, Ночино) до жёстких «аптечных» биттеров (Фернет-Бранка). Уточняйте у гостя переносимость горечи, прежде чем рекомендовать."},{"id":"martini","title":"Мартини (вермуты)","type":"s","sub":"Линейка вермутов дома Martini & Rossi — основа многих коктейлей бара.","primer":"Шкала сладости и горечи: <b>Бьянко</b> — самый сладкий и ванильный → <b>Фиеро</b> — цитрусовый красный → <b>Экстра Драй</b> — почти без сахара → линейка <b>Ризерва</b> — более выдержанная и сложная версия каждого стиля."},{"id":"grappa","title":"Крымская граппа","type":"s","sub":"Виноградный дистиллят крымского производства в стиле итальянской граппы.","primer":"Разница между Ориджинал и Резерв — только в выдержке: чем дольше дистиллят проводит в дереве, тем мягче и сложнее вкус."},{"id":"whiskey","title":"Виски","type":"s","sub":"Ирландия, Шотландия, США и другие страны — крупнейший раздел карты.","primer":"<b>Односолодовый (single malt)</b> — из одного завода и одного вида зерна, более характерный вкус. <b>Купажированный (blended)</b> — смесь нескольких заводов и зернового спирта, мягче и универсальнее. Регион меняет характер: Спейсайд — фруктовый и медовый, Айла — дымный и йодистый, Хайленд — плотный, Лоуленд — лёгкий и цветочный. Тройная дистилляция (Ирландия, некоторые лоулендские виски) даёт более гладкий результат, чем двойная."},{"id":"crimeacognac","title":"Крымский коньяк","type":"s","sub":"Коньяки крымского производства линейки «Коктебель».","primer":"Цифра в названии — примерный возраст выдержки в годах: чем она больше, тем мягче и сложнее вкус, меньше спиртовой резкости."},{"id":"cognac","title":"Коньяк и кальвадос","type":"s","sub":"Французские дома Коньяка и Нормандии.","primer":"<b>VS</b> (Very Special) — от 2 лет в дубе, самый молодой и резкий. <b>VSOP</b> (Very Superior Old Pale) — от 4 лет, более округлый. <b>XO</b> (Extra Old) — от 10 лет, самый мягкий, с нотами сухофруктов, орехов и специй. Кальвадос — тот же принцип выдержки, но из яблок, а не винограда."},{"id":"rum","title":"Ром","type":"s","sub":"Карибский и индоокеанский ром — от лёгкого до выдержанного солера.","primer":"Белый ром — невыдержанный, лёгкий, для коктейлей. Тёмный/золотой — выдержан в дубе, с ванилью и карамелью. Солера (Закапа, Дипломатико) — метод как у хереса: смешивание разных выдержек через ярусы бочек, даёт особую глубину и сладость."},{"id":"vodka","title":"Водка","type":"s","sub":"Российская и международная водка.","primer":"Отличия внутри категории — в зерне (пшеница, рожь, полба) и степени очистки: чем мягче зерно и деликатнее фильтрация, тем меньше спиртового жжения и заметнее сладковатый шлейф."},{"id":"gin","title":"Джин","type":"s","sub":"Классический лондон-драй и современные ботанические стили.","primer":"Лондон драй — классика с доминантой можжевельника. Современный ботанический стиль добавляет огурец, цветы, азиатские специи или цитрусы, смягчая можжевеловую резкость и делая джин более «гастрономичным»."},{"id":"tequila","title":"Текила и мескаль","type":"s","sub":"Дистилляты голубой агавы и дикого мескаля из Мексики.","primer":"<b>Бланко</b> (серебряная) — невыдержанная, чистый вкус агавы. <b>Репосадо</b> — 2–12 месяцев в дубе, мягче и округлее. <b>Аньехо</b> — от года, самая сложная и мягкая. <b>Мескаль</b> — не текила: делается из других видов агавы, часто с дымным вкусом от обжига сырья в земляных ямах."}],"D":[["cocktails","Яблочный Сад","950","джин Бомбей Сапфир, яблочный дистиллят, фейхоа, белое вино","рокс","Свежий, кисло-сладкий; можжевельник джина на входе, терпкая фейхоа в середине, сухой винный финиш.","Авторский коктейль бара — садовый и лёгкий профиль без резкой крепости.","Предлагайте гостям, которые просят «что-то лёгкое, не приторное» перед едой — хорошо открывает аппетит."],["cocktails","Белый Спритц","960","дыня, Мартини Бьянко, икра из маракуйи","бокал для вина","Сладковато-дынный, с мягкой горчинкой Бьянко и лёгкой кислинкой маракуйи; пьётся легко.","Летний спритц на вермутной основе; «икра» — декоративные семена маракуйи на поверхности. Подаётся в винном бокале, а не в хайболе, как классический Апероль Спритц.","Идеальный выбор для гостя, который хочет спритц, но не любит горечь Апероля или Кампари."],["cocktails","Зелёная Груша","990","текила Эль Текиленьо Бланко, груша, базилик","купе","Травяной базилик на первом плане, сладость груши в середине, тёплое агавовое послевкусие.","Базилик смягчает резкость текилы, груша добавляет мягкую сладость.","Для гостей, которые говорят «не люблю текилу» — базилик и груша убирают резкость и мягко знакомят с ней заново."],["cocktails","Гранатовый спритц","990","гранатовый вермут, Мартини Брют, кордиал чёрной смородины","бокал для вина","Более тёмный и винный вкус, чем у классического спритца; терпкая гранатовая ягодность без выраженной горечи.","Спритц на вермутной, а не биттерной основе — принципиально другой профиль, чем у Апероля или Кампари.","Хороший выбор для тех, кому обычный Апероль Спритц кажется слишком сладким или «аптечным»."],["cocktails","Смородиновая авиация","990","джин Би Джин Лондон Драй, ликёр Мараскино, смородиновый кордиал, голубика","коктейльная рюмка (купе)","Сухой, можжевеловый, с цветочной нотой мараскино и лёгкой терпкостью смородины и голубики.","Отсылка к классическому Aviation (США, начало XX века), но с русскими ягодами вместо фиалкового ликёра.","Предлагайте гостям, которые любят классику вроде Aviation или Martini, но хотят локальный акцент."],["cocktails","Малиновый блеск","990","граппа Коктебель Ориджинал, личи, малина","бокал Шале","Лёгкий, некрепкий — сладость личи и малины смягчает виноградную теплоту граппы, пьётся мягко.","Виноградный дистиллят в паре с азиатским личи — редкое для карты сочетание.","Хорошая рекомендация для девушек — сладкий, некрепкий на вкус, с красивым розовым цветом в бокале."],["cocktails","Красный Бархат","990","клубника, ликёр Сакура, Мартини Ризерва Амбрато","лавовый рокс","Десертный профиль: клубника и вишнёвая нота сакуры на фоне орехово-карамельного вермута Амбрато.","Название и цвет отсылают к десерту red velvet.","Предлагайте вместо десерта или вместе с чизкейком — коктейль работает как «жидкий десерт»."],["cocktails","Драконья Ягода","1100","водка Грей Гуз, лимонный дистиллят, драгон фрут, лайм","купе, специальная подача","Яркий, кислый: лайм и лимонный дистиллят на первом плане; драгон фрут больше для цвета, почти без вкуса.","Драгон фрут (питахайя) даёт эффектный цвет, но почти нейтрален на вкус — работают цитрусы.","Выбирайте для гостей, которым важна подача и фото — самый визуально яркий бокал в карте."],["cocktails","Фантом","1290","водка, кафирский лайм, базилик, каламанси, мята, берёзовый сок","ледяной хайбол","Свежий и травяной: цитрусовая нота кафирского лайма и каламанси, прохлада мяты и базилика, лёгкая земляная сладость берёзового сока.","Фирменный коктейль ресторана, названный в честь ресторана, а не бара.","Это визитная карточка заведения — предлагайте её первой, если гость просит «что-то от ресторана»."],["cocktails","Мартини Фиеро-Тоник","990","вермут Мартини Фиеро, тоник","винный бокал","Лёгкий, цитрусовый, слегка горьковатый — заметно мягче классического джин-тоника.","Простой лонг на цитрусовом красном вермуте Fiero.","Хороший первый шаг для гостя, который «не уверен, что хочет алкоголь покрепче»."],["cocktails","Сибирский Сауэр","1690","виски, лесные ягоды, лайм","рокс (стакан для сауэра)","Классический баланс кислое-сладкое виски сауэра, усиленный терпкостью сибирских лесных ягод.","Локальная версия классического Whiskey Sour (США, XIX век).","Для гостей, любящих виски, но предпочитающих более освежающий, летний формат подачи."],["cocktails","Мартини Ризерва Негрони","1190","джин, Мартини Ризерва Рубино, Кампари","рокс (double old fashioned)","Плотный, горький, травянисто-цитрусовый; выдержанный вермут Riserva даёт больше глубины, чем в классическом рецепте.","Классический Негрони придумали во Флоренции в 1919 году для графа Камилло Негрони.","Предлагайте гостям, которые уже пьют Негрони регулярно и ищут более «взрослую» версию классики."],["cocktails","Беллини по-Коктебельски","1100","белый персик, игристое вино","винный бокал","Мягкий, персиковый, с деликатными пузырьками — почти без выраженной кислотности или горечи.","Оригинальный Bellini создал Джузеппе Чиприани в венецианском Harry's Bar в 1948 году.","Универсальный лёгкий аперитив для гостей, которые «не пьют крепкое» и просят что-то праздничное."],["cocktails","Апероль Спритц","1100","Апероль, игристое вино, содовая","бокал для вина","Горьковато-сладкий, апельсиновый, с лёгкой пузырьковой свежестью — самый узнаваемый вкус в категории спритцев.","Спритц родился в Венето XIX века, когда австрийские солдаты разбавляли крепкое местное вино содовой.","Универсальный выбор — предлагайте как безопасный вариант гостю, ещё не определившемуся с напитком."],["cocktails","Сарти Спритц","1100","ликёр Сарти, игристое вино, содовая, лайм","бокал для вина","Более травяной и артишоковый, менее сладкий, чем Апероль — суше и «взрослее» на вкус.","Sarti — итальянский биттер-ликёр на артишоке.","Предлагайте гостям, которые находят Апероль слишком сладким и просят «что-то менее приторное»."],["cocktails","Кампари Спритц","1100","Кампари, игристое вино, содовая, апельсин","бокал для вина","Самый горький из спритцев карты, с яркой цитрусовой цедрой апельсина.","Кампари создал Гаспаре Кампари в Милане в 1860 году; рецептура держится в секрете до сих пор.","Для гостей с опытом употребления биттеров — не первая рекомендация тому, кто пробует спритц впервые."],["cocktails","CrownESS","1500","тоник Evervess orange, ром, кокос, ананас","хайбол","Тропический, кокосово-ананасовый, с лёгкой ромовой теплотой и апельсиновой шипучестью тоника.","Хайбол на основе тоника Evervess с апельсиновой нотой.","Хороший выбор для летнего настроения и гостей, любящих сладкие тропические лонги."],["cocktails","BlueEVER","1500","тоник Evervess lime-feijoa, джин","хайбол","Свежий, лаймово-фейхоа, с чёткой можжевеловой основой — суше, чем CrownESS.","Джин-тоник с лаймово-фейхоа профилем тоника Evervess.","Предлагайте вместо классического джин-тоника тем, кто хочет тот же формат, но ярче по вкусу."],["tinder","Cosmo Pina Colada = CosmoColada","890","клюква, кокос, ром, водка","купе","Кисло-сладкая клюква Космополитена встречается со сливочным кокосом Пина Колады — необычный, но сбалансированный дуэт.","Соединяет Космополитен (Нью-Йорк, 1990-е) и Пина Коладу (Пуэрто-Рико, 1950-е) в одном бокале.","Игровая позиция меню — предложите как «свидание» двух культовых коктейлей, гостям это заходит как тема для разговора."],["tinder","Aperol French 75 = Aperol 75","890","Апероль, игристое, лимон","флюте","Игристая свежесть French 75 с горьковатой апельсиновой нотой Апероля вместо джина.","French 75 — коктейль времён Первой мировой войны на джине или коньяке с шампанским.","Для гостей, которые любят и French 75, и Апероль Спритц, и не могут выбрать один вариант."],["tinder","Margarita Basil Smash = BasilMargarita","890","текила, базилик, лайм","рокс","Кислый лайм классической Маргариты вместе с травяной свежестью базилика Basil Smash.","Соединяет мексиканскую Маргариту с немецким Basil Smash, придуманным в Гамбурге в 2008 году.","Хорошая рекомендация для тех, кто любит текилу с ярким травяным акцентом."],["tinder","Negroni Pornstar = PornstarNegroni","890","джин, Кампари, вермут, маракуйя, ваниль","гоблет","Горечь Негрони на фоне сладкой маракуйи и ванили Pornstar Martini — контрастный, «качельный» вкус.","Соединяет классический Негрони (1919) с современным Pornstar Martini, придуманным Дугласом Анкрагом в Лондоне в 2002 году.","Смелый выбор для гостей, готовых к необычному контрасту горького и сладкого в одном бокале."],["seasonal","Персиковый Пай","990","граппа Коктебель Резерв, белый персик, лимон","шале","Сливочный, насыщенный, десертный — тёплая пряность граппы под мягким персиковым кремом.","Название отсылает к десерту peach pie.","Предлагайте как переход от аперитива к горячим блюдам — не слишком лёгкий, не слишком крепкий."],["seasonal","Баунти","990","кокосовый ром, апельсин, ваниль","рокс","Кокосово-ванильный, сладкий, напоминает одноимённый шоколадный батончик.","Назван в честь шоколадного батончика Bounty; готовится техникой milk punch через кокосовое молоко — это осветляет напиток и даёт бархатистую, мягкую текстуру без резкости спирта.","Для гостей со сладким вкусом, которые хотят десертный коктейль без десерта."],["seasonal","Тропики","990","виски, персик, маракуйя, банан","рокс","Виски встречается с персиком, маракуйей и бананом — необычно, но мягко за счёт фруктовой сладости.","Нетипичное для карты сочетание виски с тропическими фруктами вместо цитруса.","Хороший вариант для тех, кто любит виски, но хочет что-то менее «крепкое на вид»."],["seasonal","Клубничный спритц","950","клубника, арбуз, малина, игристое вино","бокал для вина","Ягодный, сладкий, без горечи — самый простой и дружелюбный по вкусу спритц в карте.","Летняя ягодная вариация спритца без биттеров.","Идеально для гостей, впервые пробующих спритцы, или тех, кто не любит горечь."],["seasonal","Юдзу спритц","950","юдзу, игристое вино, лайм","бокал для вина","Цитрусовый, чуть терпкий, сложнее и ароматнее, чем лимон или лайм по отдельности.","Юдзу — японский цитрус, сочетающий ноты лимона и мандарина.","Предлагайте гостям, интересующимся японской кухней или необычными цитрусами."],["seasonal","Манго, матча, банан","690","манго, матча, банан","хайбол","Сладкий тропический манго и банан на фоне лёгкой травяной горчинки матчи.","Смузи-коктейль на основе японского зелёного чая матча.","Хороший лёгкий вариант для дневного визита или для гостя, который хочет что-то некрепкое."],["seasonal","Бамбл","690","апельсин, грейпфрут","хайбол","Чистый цитрусовый вкус апельсина и грейпфрута — освежает без сладости.","Название отсылает к коктейлю Bramble, придуманному Диком Брэдселлом в Лондоне в 1984 году.","Для гостей, которые хотят что-то простое и не сладкое между блюдами."],["seasonal","Малиновая Матча","690","питахайя, малина, земляника","хайбол","Ягодная сладость малины и земляники, смягчённая травяной матчей и лёгкой кислинкой питахайи.","Яркий по цвету и вкусу летний коктейль.","Хорошо заходит гостям, которые «выбирают глазами» — эффектный цвет в бокале."],["seasonal","Черничная Матча","690","голубая матча, черника","хайбол","Черничная сладость и травяная нота голубой матчи; цвет меняется от капли цитруса.","«Голубая матча» — на основе цветка клитории тройчатой (butterfly pea).","Эффектная позиция для гостей, которым интересно небольшое «шоу» за столом — покажите смену цвета."],["nonalc","Апероль Спритц (0%)","850","безалкогольный аналог Апероля, игристое без спирта, содовая","бокал для вина","Тот же горько-апельсиновый профиль, что и в алкогольной версии, но без спирта.","Повторяет вкус классического спритца на безалкогольной основе.","Предлагайте гостям за рулём как полноценный, а не «компромиссный» выбор."],["nonalc","Негрони (0%)","850","безалкогольные аналоги джина, вермута и Кампари","рокс","Сохраняет горько-травяной характер оригинала практически без потери вкуса.","Безалкогольная версия классического Негрони 1919 года.","Для непьющих гостей, которые всё равно хотят «взрослый» вкус аперитива."],["nonalc","Беллини по-Коктебельски (0%)","850","белый персик, безалкогольное игристое","винный бокал","Персиковая мягкость и лёгкая шипучесть без алкоголя.","Безалкогольная версия венецианского аперитива 1948 года.","Хороший праздничный безалкогольный вариант, не уступающий по подаче алкогольному."],["nonalc","Виски Сауэр (0%)","850","безалкогольный аналог виски, лимон, сироп","рокс","Кисло-сладкий баланс лимона и сиропа, без крепкой основы.","Безалкогольная версия классического Whiskey Sour.","Для гостей, которые любят вкус сауэра, но не пьют алкоголь сегодня."],["lemonade","Арбуз-Малина","690","арбуз, малина","хайбол","Сладкий, летний, с лёгкой ягодной кислинкой.","Домашний лимонад собственного приготовления.","Для детей и гостей без алкоголя, особенно хорошо заходит в жару."],["lemonade","Домашняя кола","690","авторская рецептура на травах и специях","хайбол","Пряно-травяной профиль, сложнее и глубже покупной колы.","Готовится по собственному рецепту бара, а не из готового сиропа.","Расскажите гостю, что это авторский рецепт — хороший повод предложить попробовать вместо обычной колы."],["lemonade","Маракуйя-Кокос","690","маракуйя, кокос","хайбол","Кисло-сладкий тропический дуэт.","Домашний лимонад собственного приготовления.","Хорошо сочетается с острыми блюдами меню — предлагайте вместе."],["lemonade","Базилик-Каламанси","690","базилик, каламанси","хайбол","Травяной, с цитрусовой кислинкой необычного каламанси.","Каламанси — филиппинский цитрус, нечто среднее между лаймом и мандарином.","Для гостей, ищущих не совсем обычный безалкогольный напиток."],["tinctures","Арбуз-Малина","490","водка, арбуз, малина","рюмка","Ягодно-сладкая, мягкая на спирте.","Настойка бара — водка настаивается на свежих ягодах без перегонки.","Хорошо подавать к жирным закускам и мясу — традиционная русская подача."],["tinctures","Брусника-Саган-Дайля","490","водка, брусника, саган-дайля","рюмка","Терпкая брусника с травяной, чуть смолистой нотой саган-дайля.","Саган-дайля — алтайская и байкальская трава, в народе известная как «трава от ста болезней».","Расскажите гостю про сибирскую траву — хорошая тема для короткой беседы за столом."],["tinctures","Чернослив-шоколад","490","водка, чернослив, шоколад","рюмка","Плотная, десертная, с сухофруктовой сладостью.","Настойка на черносливе и шоколаде.","Предложите вместо десертного ликёра в конце ужина."],["tinctures","Банан-сливки","490","водка, банан, сливки","рюмка","Сливочно-мягкая, почти без спиртовой резкости.","Настойка на банане и сливках.","Для гостей, которые обычно не пьют крепкое чистым — мягкий вход в категорию настоек."],["tinctures","Лимончелло","490","лимонная настойка","рюмка","Яркая лимонная цедра, сладкая, освежающая.","Настойка в духе итальянского Limoncello — ликёра из цедры лимона с побережья Амальфи и острова Капри.","Классическая позиция для завершения ужина, особенно после итальянских блюд меню."],["beer","Аббе Блонд/Брюн","790","бельгийский эль","бокал-тюльпан","«Abbey beer» — стиль, восходящий к традиции монастырского пивоварения Бельгии: с XII века монахи варили крепкий эль, чтобы поддерживать силы в дни поста, когда есть было нельзя, а пить — можно. Верхнее брожение даёт фруктовые, пряные тона — гвоздика, банан, чернослив — без добавления фруктов.","Блонд светлее и суше, с медовой нотой; Брюн темнее, с карамелью и сухофруктами. Уточните у гостя предпочтение перед заказом — это разные напитки, а не крепость одного и того же пива.","Подавайте в бокале-тюльпане, температура 6-8°C — форма бокала собирает пену и концентрирует аромат."],["beer","Корона Экстра","890","мексиканский лагер","бутылка/пивной бокал","Corona Extra от Grupo Modelo — один из самых узнаваемых мексиканских лагеров в мире, на рынке с 1925 года; прозрачная бутылка — часть фирменного образа, хотя пивовары обычно избегают света, чтобы пиво не «скисало» от УФ-лучей.","Самый лёгкий и нейтральный лагер в карте, почти без хмелевой горечи — хорошая база для гостя без опыта в крафтовом пиве.","Классика — подавайте с долькой лайма, вставленной в горлышко, очень холодной; лайм не только для аромата, но и по легенде изначально отпугивал мух на летних мексиканских верандах."],["beer","Перони","950","итальянский лагер","высокий бокал","Марка Peroni основана в 1846 году в городе Виджевано на севере Италии Франческо Перони; культовая версия Nastro Azzurro появилась только в 1963 году к визиту итальянской команды на международную выставку.","Более плотный и хмелевой, чем Корона Экстра, с чёткой солодовой основой.","Подавайте в высоком бокале, холодным — узкий бокал дольше удерживает карбонизацию."],["beer","Кристоффель блонд","690","нидерландский крафт","пилснер-бокал","Одна из старейших независимых пивоварен Нидерландов, основана в 1852 году в Роермонде; варит некрепкие партии по традиционным лагерным рецептам, без пастеризации.","Более сложный, «пильзнерный» вкус, чем у массовых лагеров карты — заметная хмелевая горчинка и сухой финиш.","Предлагайте гостям, которые ищут пиво не из масс-маркета — хорошая тема для разговора о разнице между крафтом и промышленным лагером."],["beer","Кармелитер","690","немецкое пиво","кружка/бокал","Название отсылает к ордену кармелитов — традиции монастырского пивоварения Германии, где с XIV века при монастырях держали собственные пивоварни для паломников.","Плотнее и солоднее типичного лагера карты, с заметной хлебной нотой.","Хороший вариант для гостей, любящих плотное немецкое пиво — подавайте в кружке, не переохлаждая, чтобы раскрылась солодовая сладость."],["beer","Бад б/а","690","безалкогольный лагер","пивной бокал","Безалкогольная версия Budweiser — пиво варят как обычно, а затем алкоголь удаляют вакуумной дистилляцией при низкой температуре, чтобы сохранить вкус и аромат хмеля.","Единственная безалкогольная позиция среди лагеров карты.","Предлагайте гостям за рулём как полноценную альтернативу обычному пиву, очень холодным — по вкусу и подаче не должна отличаться от обычного пива."],["beer","Шпатен (драфт)","750","мюнхенский лагер","пивной бокал","Spaten — одна из старейших пивоварен Мюнхена, документально известна с 1397 года, у истоков стиля хеллес и октоберфестского марцена; именно Spaten одной из первых начала холодное лагерное брожение в промышленных масштабах в XIX веке.","Классический мюнхенский хеллес — эталон стиля светлого лагера: мягкий, солодовый, без резкой хмелевой горечи.","Подавайте свежим из-под крана, с плотной пеной 2-3 см — правильная пена защищает пиво от выветривания углекислоты."],["beer","Хугарден (драфт)","750","бельгийский витбир","бокал-тюльпан","Пшеничное пиво с кориандром и апельсиновой цедрой, родом из бельгийской деревни Хогарден; рецепт почти исчез в 1950-х, когда закрылась последняя пивоварня стиля, и был восстановлен местным молочником Пьером Селисом в 1966 году буквально по памяти.","Единственное пшеничное пиво (витбир) в карте — мутновато-белёсое от взвеси дрожжей и непророщенной пшеницы, с пряностями, отличается от всех лагеров и элей рядом.","Подавайте с долькой апельсина, в бокале-тюльпане — специи в составе (кориандр, куантро) хорошо перекликаются с цитрусом."],["port","Барбадийо Фино","1490","испанский херес","рюмка для хереса","Fino из Санлукар-де-Баррамеды — сухой херес, выдержанный «под флором», живой плёнкой диких дрожжей, которая нарастает на поверхности вина в бочке и защищает его от контакта с воздухом, не давая окислиться. Дом Barbadillo работает в этом городке с 1821 года.","Единственный сухой херес в карте — не путать со сладкими портвейнами рядом: у Fino солёная, миндальная, почти хлебная нота вместо сладости.","Подавайте сильно охлаждённым, 8-10°C, небольшими порциями — на воздухе и в тепле херес быстро теряет свежесть флора."],["port","Доуз Файн Руби","1490","португальский портвейн","рюмка для портвейна","Dow's — один из старейших портвейных домов долины Дору, известен с XVIII века; входит в семью Symington, одну из главных портвейных династий Португалии.","Более фруктовый и яркий, чем Доуз Файн Уайт — ноты вишни и сливы за счёт короткой выдержки в основном в больших бочках, где вино почти не контактирует с деревом.","Подавайте комнатной температуры или слегка охлаждённым, 14-16°C."],["port","Доуз Файн Уайт","1490","португальский портвейн","рюмка для портвейна","Белый портвейн того же дома Dow's — делается из белых сортов винограда долины Дору, а не из красных, как классический Ruby.","Светлее и ореховее Ruby, менее сладкий — хорошая альтернатива для гостя, который просит портвейн «не приторный».","Можно подавать охлаждённым, 10-12°C, как аперитив, а не только как дижестив."],["liqueurs","Медофф Ягодная","500","ягодный ликёр","рюмка","Российский ягодный ликёр на основе натуральных ягодных экстрактов.","Более сладкая и простая позиция, чем итальянские биттеры этого раздела — почти без горечи.","Подавайте охлаждённой."],["liqueurs","Селект Аперитиво","790","травяной биттер","рокс со льдом","Select — венецианский биттер-ликёр, придуманный тремя братьями Пилла в 1920 году; в отличие от Апероля и Кампари делается из более 30 трав и специй, включая юньнаньский можжевельник, привезённый через Венецианский порт со специй Востока.","Мягче и слаще Кампари — исторический предшественник спритца, а не его аналог; венецианцы считают именно Select «правильной» основой для настоящего спритца.","Подавайте со льдом и содовой."],["liqueurs","Белуга Ботаникалс Огурец и Мята","790","ботанический ликёр","рюмка со льдом","Ботанический ликёр линейки Beluga на основе огурца и мяты — часть линейки, созданной, чтобы предложить водочному бренду что-то похожее на джин по способу подачи.","Свежий, огуречно-мятный — нетипичный профиль для категории дижестивов, почти без горечи.","Подавайте со льдом, можно с долькой огурца для аромата."],["liqueurs","Хантинг Ягодный биттер","790","ягодный биттер","рюмка","Российский ягодный биттер на травах и лесных ягодах.","Горечь среднего уровня — хороший вариант между мягкими и жёсткими биттерами карты.","Подавайте небольшими порциями, охлаждённым."],["liqueurs","Кампари","490","красный биттер","рокс со льдом","Создан Гаспаре Кампари в Милане в 1860 году; точная рецептура из десятков трав, кореньев и цитрусовых корок держится в секрете до сих пор и известна лишь узкому кругу людей на заводе.","Более резкий и горький, чем Апероль или Селект — характерная хинная горечь на языке.","Подавайте со льдом или содовой, с долькой апельсина."],["liqueurs","Мамонт Блад","790","ягодный ликёр/биттер","рюмка","Российский биттер линейки «Мамонт» на сибирских ягодах и травах.","Локальная альтернатива европейским биттерам карты — можно предложить как «наш ответ» Кампари или Апперолю.","Подавайте охлаждённым, небольшими порциями."],["liqueurs","Егермейстер","890","немецкий травяной ликёр","стопка ледяная","Jägermeister создан в 1878 году в Германии семьёй Мает; рецепт включает 56 трав, кореньев, цветов и специй, а название переводится как «егерь», «хранитель леса» — отсюда олень на этикетке.","Сладко-пряный, а не горький, как большинство дижестивов этого раздела — самый сложный по составу набор ингредиентов в карте.","Подавайте строго ледяным, из морозильной камеры — при комнатной температуре вкус становится приторным."],["liqueurs","Фернет-Бранка","890","итальянский горький дижестив","рюмка","Fernet-Branca выпускает миланский дом Fratelli Branca с 1845 года по рецепту, который знают только несколько человек в компании; в Италии его считают средством «после застолья» и лекарством от похмелья, а в Сан-Франциско это культовый напиток бартендеров.","Самый горький и «аптечный» дижестив всей карты — в составе шафран, ревень и мирра.","Подавайте комнатной температуры или со льдом, маленькими порциями, предупредив гостя о выраженной горечи."],["liqueurs","Бранка Мента","890","мятный ликёр","рюмка со льдом","Мятная версия Fernet-Branca того же миланского дома Fratelli Branca — на ту же горькую основу добавлена мята.","Та же горечь Фернета, смягчённая холодящей мятой — проще для тех, кто пробует категорию впервые.","Подавайте со льдом, хорошо освежает после жирных блюд."],["liqueurs","Ракия Айва","980","балканский фруктовый дистиллят","рюмка","Традиционный крепкий дистиллят Балканского региона из айвы — в Сербии, Болгарии и Хорватии ракию часто варят домашним способом и подают как символ гостеприимства перед застольем.","Фруктовый дистиллят, а не травяной ликёр, как остальные позиции раздела — сухой, с выраженным айвовым ароматом.","Подавайте охлаждённой, как аперитив, перед едой."],["liqueurs","Ночино","980","ореховый ликёр","рюмка","Итальянский ликёр из зелёных, ещё молочных грецких орехов, традиция региона Эмилия-Романья; по легенде орехи для лучшего ликёра нужно собирать голыми руками в ночь на Ивана Купалу, 24 июня, пока в них ещё много горького млечного сока.","Единственный ореховый (не травяной и не анисовый) ликёр раздела — тёмный, пряный, с нотами корицы и гвоздики.","Подавайте комнатной температуры, после ужина, маленькими порциями."],["liqueurs","Гальяно Ристретто","1090","итальянский ликёр с кофе","рюмка","Galliano Ристретто — версия классического ликёра Galliano (создан в 1896 году и назван в честь итальянского героя войны Джузеппе Гальяно) с добавлением ноты настоящего эспрессо-ристретто.","Кофейная нота отличает эту позицию от прочих сладких ликёров карты — ванильно-анисовая база Galliano хорошо оттеняет кофе.","Хорош как дижестив или добавка в кофейный коктейль вроде Espresso Martini."],["liqueurs","Самбука Молинари","1490","итальянская анисовая самбука","рюмка","Molinari выпускает самбуку в Риме с 1945 года по фамильному рецепту на основе звёздчатого аниса; традиционно подают «con la mosca» («с мухой») — с тремя кофейными зёрнами на дне бокала.","Анисовая — единственная в этой категории, самая «сладкая на нос» позиция раздела.","Предложите гостю подачу с тремя кофейными зёрнами на дне бокала — по традиции они символизируют здоровье, счастье и благополучие."],["liqueurs","Амаро Монтенегро","1290","итальянский амаро","рюмка","Amaro Montenegro создан в Болонье в 1885 году Ставаро Веццози примерно из 40 трав, цветов и специй; название и черногорская королева на этикетке — дань уважения королеве Елене Черногорской, вышедшей замуж за итальянского короля.","Самый мягкий и доступный амаро карты — цветочный, ванильный, почти без резкой горечи — хорошее знакомство с категорией для новичка.","Подавайте со льдом или чистым, после еды."],["martini","Мартини Бьянко","590","сладкий белый вермут","рюмка/со льдом","Дом Martini & Rossi основан в Турине в 1863 году Алессандро Мартини и травником Луиджи Россом, чей опыт работы с растениями и лёг в основу рецептуры; вермут — это вино, ароматизированное настоем трав и специй, название происходит от немецкого «wermut» (полынь).","Самый сладкий и мягкий, ванильный вермут карты — с нотами ванили и цитрусовой цедры.","Хорош со льдом и содовой, как лёгкий аперитив, с долькой апельсина."],["martini","Мартини Фиеро","590","цитрусовый красный вермут","со льдом","Более современная линейка дома Martini, созданная как ответ на моду на спритцы, с выраженной апельсиновой нотой и оттенком горькой апельсиновой цедры.","Более горький и цитрусовый, чем Бьянко, но заметно мягче настоящих биттеров вроде Кампари.","Хорош в лонгах с тоником для лёгкого старта вечера."],["martini","Мартини Экстра Драй","590","сухой белый вермут","коктейльная рюмка","Классическая основа для сухого мартини-коктейля — именно этот стиль вермута дал имя знаменитому Dry Martini начала XX века.","Практически без сладости — самый сухой вермут карты, с травяной и слегка солоноватой нотой.","Подавайте очень холодным, для классического Dry Martini — чем меньше вермута в рецепте, тем «суше» коктейль."],["martini","Мартини Ризерва Рубино","850","выдержанный красный вермут","со льдом","Премиальная линейка Riserva создана виноделом дома Джакомо Мартини специально к 150-летию бренда; выдерживается дольше стандартных вермутов на основе более сложных базовых вин.","Более глубокая и выдержанная версия красного вермута, чем Фиеро — с нотами какао и сушёного инжира.","Подавайте как самостоятельный аперитив со льдом и цедрой апельсина."],["martini","Мартини Ризерва Амбрато","850","выдержанный янтарный вермут","чистым","Более ореховый и карамельный профиль внутри линейки Riserva — сделан по историческому рецепту начала XX века на основе вина Москато.","Самый «десертный» вермут карты — миндаль, карамель, сухофрукты.","Хорош в чистом виде со льдом как дижестив, после ужина."],["martini","Мартини Ризерва Биттер","890","выдержанный горький вермут","со льдом","Самый терпкий и травяной вермут линейки Riserva.","Самый горький вермут всей карты — не первая рекомендация новичку.","Для гостей, которые уже любят Негрони и Кампари."],["grappa","Коктебель Ориджинал","790","крымская виноградная граппа","рюмка","Виноградный дистиллят производится в Коктебеле, регионе Юго-Восточного Крыма — по итальянской технологии граппы: сырьём служит виноградный жмых (выжимки), оставшийся после производства вина, а не сам виноград, что исторически позволяло не тратить продукт впустую.","Базовая, менее выдержанная и более резкая версия линейки — прямолинейный виноградный дистиллят.","Подавайте охлаждённой, небольшими порциями, как дижестив."],["grappa","Коктебель Резерв","960","выдержанная крымская граппа","рюмка","Более выдержанная версия того же крымского дистиллята — проводит дополнительное время в дубовых бочках, приобретая цвет и мягкость.","Мягче и сложнее Ориджинал за счёт дополнительной выдержки в дереве — ванильные и ореховые тона.","Хорошо раскрывается при комнатной температуре — не переохлаждайте, иначе аромат дерева не раскроется."],["whiskey","Джемесон","990","ирландский купажированный виски","со льдом/чистым","Дублинская марка, основанная Джоном Джеймсоном в 1780 году; ирландский виски по закону пишется через «e» — whiskey, в отличие от шотландского whisky, и это не опечатка, а принципиальное различие двух традиций.","Купажированный, тройная дистилляция — мягче большинства шотландских виски карты за счёт дополнительного, третьего прохода через куб.","Хорош со льдом или чистым — универсальная точка входа в категорию."],["whiskey","Тилинг Сингл Молт","1190","ирландский односолодовый виски","бокал тюльпан","Teeling — первая новая дублинская вискикурня почти за полвека, открыта в 2015 году семьёй, которая до этого десятилетиями продала свой прежний бизнес Cooley международному концерну — и начала всё заново.","Односолодовый, более фруктовый и структурный, чем купажи вроде Джемесон, часто дозревает в нестандартных бочках из-под рома или вина.","Подавайте чистым, в бокале тюльпан."],["whiskey","Хинч Дистиллерс Кат","1290","виски Северной Ирландии","чистым/со льдом","Вискикурня Hinch в графстве Даун, Северная Ирландия, основана в 2020 году — часть новой волны молодых ирландских производителей.","Молодая вискикурня, более современный стиль, чем у исторических брендов рядом — экспериментирует с бочками активнее старых домов.","Подавайте чистым или со льдом."],["whiskey","Бушмилз Блэк Буш","1680","ирландский виски","чистым","Old Bushmills в Северной Ирландии — старейшая лицензированная вискикурня в мире, лицензия на производство выдана королём Яковом I в 1608 году.","Высокая доля солодового виски в купаже делает его насыщеннее стандартного Бушмилз — с хересной, ореховой нотой.","Подавайте чистым."],["whiskey","Тилинг Блэкпиттс","1300","торфяной ирландский виски","чистым","Teeling Blackpitts — редкость для ирландского стиля: название отсылает к историческому району Дублина, где раньше добывали торф для города.","Единственный торфяной (дымный) виски среди ирландских позиций карты — Ирландия традиционно избегает торфа, в отличие от Шотландии.","Подавайте чистым, чтобы гость мог оценить дым."],["whiskey","Дюарс Френч Смуз 8","890","шотландский купажированный виски","со льдом","Dewar's основан в Перте Джоном Дюаром в 1846 году; версия French Smooth дополнительно дозревает в бочках из-под французского вина, что и даёт название и характерную мягкость.","Базовая, самая мягкая позиция купажей Dewar's в карте.","Подавайте со льдом."],["whiskey","Дюарс Уайт Лэйбл","990","шотландский купажированный виски","со льдом/в коктейль","Классический купаж дома Dewar's — один из первых виски, который начали продавать уже разлитым в фирменные бутылки, а не бочками, ещё в конце XIX века.","Чуть более насыщенный, чем French Smooth того же дома.","Хорош со льдом или в коктейле."],["whiskey","Дюарс 12 лет","1260","шотландский купажированный виски","чистым","Выдержанная версия купажа Dewar's, проходит дополнительный процесс двойного созревания («double aged»).","Более выдержанная и глубокая, чем White Label и French Smooth — мёд, ваниль, сухофрукты.","Подавайте чистым."],["whiskey","Торвег","2090","шотландский виски","чистым","Позиция премиального сегмента шотландской карты.","Уточните точный стиль и регион у бара перед подробной рекомендацией гостю, чтобы точно описать вкусовой профиль.","Подавайте чистым."],["whiskey","Чивас Ригал 12","1590","шотландский купажированный виски","со льдом","Chivas Brothers ведёт историю с 1801 года — марка начиналась как бакалейная лавка в Абердине, где братья Чивас продавали продукты и виски местной аристократии, включая королевский двор.","Медово-фруктовый купаж, мягче, чем односолодовые виски карты, с яблочной и ванильной нотой.","Подавайте со льдом."],["whiskey","Чивас Ригал 18","2850","шотландский купажированный виски","чистым","Более выдержанная и насыщенная версия купажа Chivas Regal — в основе купажа лежат более 20 разных виски.","Заметно глубже и сложнее, чем Chivas 12 — тёмный шоколад, специи, сухофрукты.","Подавайте чистым."],["whiskey","Манки Шолдер","1790","купажированный солодовый виски","в коктейль/чистым","Monkey Shoulder от William Grant & Sons назван в честь профессионального заболевания солодовщиков, у которых от долгих часов ворочания влажного ячменя лопатой одна рука опускалась ниже другой — отсюда и «обезьянье плечо» на этикетке.","Купаж только из односолодовых виски трёх спейсайдских вискикурен, без зернового спирта — более характерный вкус, чем у обычных блендов.","Отлично работает в коктейлях, особенно в Whisky Sour — создавался как «бармен-френдли» виски."],["whiskey","Гленфиддик 12","2750","спейсайдский односолодовый виски","чистым","William Grant & Sons основали Glenfiddich («долина оленя» на гэльском, отсюда олень на этикетке) в 1887 году; это самый продаваемый односолодовый виски в мире и одна из первых марок, начавших массово продвигать сам термин «single malt» в 1960-х.","Лёгкий, грушево-яблочный — самая простая точка входа в односолодовые виски карты.","Подавайте чистым или с каплей воды — вода немного «раскрывает» аромат."],["whiskey","Лох Ломонд Ориджинал","1490","шотландский виски","чистым","Вискикурня на берегу озера Лох-Ломонд, известна разнообразием стилей перегонки на одном заводе — по сути, единственная в Шотландии, где можно делать и солодовый, и зерновой виски под одной крышей на разных типах кубов.","Средний по насыщенности односолодовый виски.","Подавайте чистым."],["whiskey","Лох Ломонд Олоросо Шерри Каск","1590","виски в хересной бочке","чистым","Дозревание в бочках из-под испанского хереса Олоросо добавляет сухофруктовые и ореховые тона — сама бочка отдаёт виски часть своего прежнего содержимого.","Плотнее и слаще, чем Loch Lomond Original того же завода.","Подавайте чистым."],["whiskey","Балвени 12","3750","спейсайдский односолодовый виски","чистым","The Balvenie того же дома William Grant & Sons известен собственным соложением ячменя на полу (floor malting) — редкая сегодня, трудоёмкая ручная технология, которую завод сохраняет на части производства просто из принципа.","Более маслянистая, «медовая» текстура, чем у большинства спейсайдских виски карты.","Подавайте чистым, не торопясь, дав раскрыться в бокале."],["whiskey","Акентошан Три Вуд","2250","равнинный шотландский виски","чистым","Auchentoshan — один из немногих виски Шотландии с тройной, как в Ирландии, а не двойной перегонкой; линейка Three Wood дополнительно вызревает последовательно в трёх разных типах бочек — бурбонной, олоросо и педро хименес.","Самый гладкий и сладкий лоулендский виски карты за счёт тройной дистилляции и трёх типов бочек.","Подавайте чистым."],["whiskey","Лафройг Селект Каск","2290","islay виски","чистым","Laphroaig с острова Айла — один из самых торфяных и дымных виски Шотландии; во время сушки солода дым от горящего торфа буквально пропитывает зерно, а знаменитый йодистый привкус идёт от близости вискикурни к морю.","Противоположность мягким спейсайдским позициям карты — максимум дыма, йода и лечебных, аптечных тонов.","Подавайте чистым, предупредив гостя о выраженном дыме — не всем нравится с первого раза."],["whiskey","Макаллан 12","3950","спейсайдский односолодовый виски","чистым","The Macallan известен долгой традицией выдержки почти исключительно в испанских хересных бочках из европейского дуба — на них дом тратит заметно больше, чем конкуренты, что и объясняет премиальный ценник.","Орехово-сухофруктовый, тёмный профиль — контраст более лёгкому и «яблочному» Гленфиддику.","Подавайте чистым."],["whiskey","Макаллан 18","13500","спейсайдский односолодовый виски","чистым","Более выдержанная версия того же дома с хересной бочкой — считается одним из самых коллекционируемых виски в мире, бутылки редких годов уходят на аукционах за десятки тысяч долларов.","Глубже и сложнее, чем Макаллан 12, за счёт более долгой выдержки — какао, апельсиновая цедра, специи.","Топовая подача карты — подавайте чистым, не спеша, в широком бокале."],["whiskey","Олтмар 12 лет","1300","шотландский виски","чистым","Позиция шотландской карты выдержкой 12 лет.","Уточните точный региональный профиль у бара перед подробной рекомендацией.","Подавайте чистым."],["whiskey","Аберфелди 12","1300","хайлендский односолодовый виски","чистым","Aberfeldy — «домашний» виски для дома Dewar's в Перте, построен специально, чтобы поставлять солодовую основу для купажей Dewar's, и лишь позже начал продаваться как отдельный односолодовый бренд.","Медовый, мягкий профиль, родственный стилю Dewar's — вересковый мёд и груша.","Хорошо сочетается с десертами."],["whiskey","Крейгелахи","1500","спейсайдский односолодовый виски","чистым","Craigellachie известен характерным «мясистым», слегка серным профилем благодаря устаревшим worm tub конденсаторам — медным трубкам, погружённым в холодную воду вместо современных кожухотрубных конденсаторов, что даёт более тяжёлый, брутальный дистиллят.","Необычный, нетипичный для спейсайда стиль — большинство соседей по региону легче и фруктовее; не для первого знакомства с регионом.","Подавайте чистым, тем, кто готов к более смелому вкусу."],["whiskey","Джек Дэниэлс","990","теннессийский виски","со льдом/в коктейль","Отличается от бурбона дополнительной фильтрацией через 3-метровый слой угля из клёна сахарного, сожжённого прямо на заводе — это называется Lincoln County Process, по названию округа в Теннесси, где находится вискикурня Линчбург.","Самый узнаваемый американский виски в мире — формально мог бы называться бурбоном, но производитель настаивает на отдельной категории «теннессийский виски» именно из-за угольной фильтрации.","Хорош со льдом или в коктейле."],["whiskey","Вудфорд Резерв","1990","кентуккийский бурбон","чистым/в Old Fashioned","Woodford Reserve — одна из старейших вискикурен Кентукки, история восходит к 1780-м годам; по закону бурбон обязан выдерживаться в новых, обугленных изнутри дубовых бочках, которые затем перепродают шотландским и ирландским производителям для повторного использования.","Более насыщенный и пряный, чем массовые бурбоны вроде Jack Daniel's — благодаря высокой доле ржи в зерновом составе.","Подавайте чистым или в Old Fashioned — классический бурбонный коктейль."],["whiskey","Рампур Асава Каберне Совиньон Каск","3100","индийский односолодовый виски","чистым","Rampur производит Radico Khaitan в предгорьях Гималаев на высоте около 300 метров; здесь — дозревание в бочке из-под красного вина Каберне Совиньон. Жаркий индийский климат ускоряет созревание виски в разы быстрее, чем в Шотландии.","Необычная ягодная, винная нота от винной бочки — нетипично для виски.","Подавайте чистым, как дегустационную позицию."],["whiskey","Рампур Дабл Каск Сингл Молт","2800","индийский односолодовый виски","чистым","Двойное дозревание того же гималайского производителя Radico Khaitan — сначала в бурбонных бочках, затем досозревание в бочках из-под хереса.","Более классический профиль, чем у Асава Каберне Совиньон Каск.","Подавайте чистым."],["whiskey","Никка Дейс","2350","японский виски","чистым/хайбол","Nikka основал Масатака Такэцуру, который в 1918 году уехал изучать винокурение в Шотландию, женился там на шотландке Джесси Ройте и привёз технологию в Японию, основав индустрию японского виски.","Японский стиль, вдохновлённый Шотландией, но мягче и легче, с более чистым, деликатным профилем.","Подавайте чистым или в формате «хайбол» с содовой — традиционная японская повседневная подача виски."],["whiskey","Хатозаки","1290","японский купажированный виски","хайбол","Японский виски, ориентированный на международный рынок — купаж из зернового и солодового виски нескольких японских заводов.","Более доступная и лёгкая точка входа в японский виски, чем Никка Дейс.","Хорошо подавать в формате хайбол с содовой — самый популярный способ пить виски в Японии."],["whiskey","Бельвуа Финисьон Гран Фан","1480","виски европейского производства","чистым","Позиция карты премиального сегмента крепких напитков.","Уточните точный профиль у бара перед подробной рекомендацией гостю.","Подавайте чистым."],["crimeacognac","Коктебель Резерв 7","750","крымский коньяк","бокал тюльпан","Традиция коньячного производства в Крыму восходит к концу XIX века — заводы Коктебеля и «Массандры» строил ещё князь Лев Голицын, доказавший, что крымский бренди может конкурировать на международных дегустациях с французским коньяком.","Самая молодая и резкая позиция линейки — 7 лет выдержки в дубе.","Подавайте комнатной температуры, в бокале тюльпан."],["crimeacognac","Коктебель 11","980","крымский коньяк","бокал тюльпан","Более выдержанная позиция той же крымской линейки, 11 лет в бочке.","Более округлая, чем Резерв 7, за счёт трёх-четырёх лишних лет выдержки.","Предложите как апгрейд гостю, попробовавшему Коктебель Резерв 7."],["crimeacognac","Коктебель 15","1120","крымский коньяк","бокал тюльпан","Ещё более выдержанная позиция линейки Коктебель, 15 лет в дубовых бочках.","Заметно сложнее и мягче 11-летней версии — больше тонов сухофруктов и специй.","Подавайте, дав гостю время раскрыть аромат в бокале."],["crimeacognac","Коктебель 30","5250","крымский коньяк","бокал тюльпан","Самая выдержанная позиция крымской линейки — топ карты коньяка местного производства, 30 лет выдержки.","Максимальная выдержка линейки — самый мягкий и сложный вкус, с тонами табака, кожи и старого дерева.","Подавайте в широком бокале, дайте гостю время раскрыть аромат перед первым глотком."],["cognac","Курвуазье ВС","2100","коньяк VS","со льдом/в коктейль","Дом Courvoisier основан в 1828 году в Жарнаке; по легенде именно этот коньяк брал с собой в изгнание на остров Святой Елены Наполеон, за что марку до сих пор иногда называют «коньяком Наполеона».","Самая молодая выдержка дома — минимум 2 года в дубе, более резкий вкус.","Хорош со льдом или в коктейле на коньячной основе."],["cognac","Курвуазье ВСОП","2390","коньяк VSOP","чистым","Более выдержанная линейка того же дома Courvoisier — категория VSOP была впервые сформулирована именно коньячными домами в XIX веке для британского королевского двора.","От 4 лет выдержки — заметно круглее и мягче VS.","Подходит и для чистой подачи, и для коктейлей."],["cognac","Курвуазье ХО","4700","коньяк XO","чистым","Самая выдержанная линейка дома Courvoisier в карте.","От 10 лет выдержки — максимум мягкости и сложности сухофруктов и специй.","Подавайте только чистым, в широком бокале, без льда."],["cognac","Барон Отард ВС","1800","коньяк VS","со льдом","Baron Otard основан в 1795 году в историческом замке Шато де Коньяк на берегу реки Шаранты — бывшей резиденции французских королей, где родился Франциск I; это единственный крупный коньячный дом, чьи погреба находятся прямо в средневековом замке.","Молодая выдержка — более резкая, чем ВСОП того же дома.","Подавайте со льдом."],["cognac","Барон Отард ВСОП","2200","коньяк VSOP","чистым","Более выдержанная версия того же дома с замковой историей.","Более округлый вкус за счёт дополнительной выдержки в дубе.","Подавайте чистым."],["cognac","Прунье ВСОП Гранд Шампань","2600","коньяк VSOP","чистым","Семейный дом Prunier из региона Гранд Шампань — самой престижной зоны апелласьона Коньяк с самой меловой почвой, которая, как считается, даёт наиболее тонкий и долго стареющий спирт.","Терруарный коньяк из одного региона — более утончённый, чем купажи из разных зон.","Подавайте чистым."],["cognac","Прунье ВС","2100","коньяк VS","со льдом","Базовая выдержка семейного дома Prunier из Гранд Шампани.","Молодая позиция того же терруарного дома, доступная точка входа.","Подавайте со льдом."],["cognac","Торрес 10","1090","испанский бренди","чистым/со льдом","Torres — семья виноделов Каталонии, работает с XIX века; бренди выдерживается в дубовых бочках, ранее использовавшихся под херес, что и даёт ему характерную ореховую ноту, отличную от французского коньяка.","Испанский бренди, а не французский коньяк — доступнее по цене при похожем профиле, хороший вариант для гостя, который просит «что-то как коньяк, но не так дорого».","Подавайте чистым или со льдом."],["cognac","Кальвадос дю Пэр Лез ВС","1850","яблочный дистиллят Нормандии","как дижестив","Кальвадос — яблочный дистиллят из региона Нормандия, откуда и название категории; во Франции существует традиция «нормандской дыры» (trou normand) — рюмка кальвадоса посреди многочасового ужина, которая якобы «освобождает место» для следующих блюд.","Яблочный, а не виноградный дистиллят — совсем другой профиль, чем у соседних коньяков.","Подавайте как дижестив, можно с долькой яблока для аромата."],["cognac","Камю ВС","2450","коньяк VS","со льдом","Camus — независимый семейный дом, основанный Жаном-Батистом Камю в 1863 году; остаётся одним из немногих крупных коньячных домов, до сих пор полностью принадлежащих семье-основателю, уже в пятом поколении.","Молодая выдержка семейного дома, доступная позиция линейки.","Подавайте со льдом."],["cognac","Камю ВСОП","3250","коньяк VSOP","чистым","Более выдержанная линейка того же семейного дома Camus.","Более глубокий вкус, чем Камю ВС — фруктовые и цветочные ноты.","Подходит и для чистой подачи, и как база для премиальных коньячных коктейлей."],["cognac","Камю ХО","9500","коньяк XO","чистым","Топовая выдержанная линейка дома Camus.","Самая мягкая и сложная позиция дома — карамель, специи, дерево.","Подавайте только чистым."],["cognac","Тессерон Композисьон","2390","коньяк","чистым","Tesseron — дом, специализирующийся на очень старых, коллекционных коньяках; знаменит тем, что покупает и хранит бочки старого коньяка десятилетиями (в погребах есть спирты возрастом больше века), а не разливает виноматериал сразу.","Фокус дома именно на редких старых коньяках отличает его от более массовых брендов рядом.","Подавайте чистым, медленно."],["cognac","Реми Мартин ВСОП","3250","коньяк VSOP Fine Champagne","чистым","Rémy Martin основан в 1724 году и использует только виноград зон Гранд и Пти Шампань — категория Fine Champagne означает, что не менее 50% спирта из Гранд Шампани, а остальное из Пти Шампани, двух лучших крю апелласьона.","Строгая привязка к двум лучшим зонам апелласьона отличает его от коньяков из смешанных регионов.","Подавайте чистым."],["cognac","Хеннесси ВСОП","2740","коньяк VSOP","со льдом/чистым","Hennessy — старейший из «большой четвёрки» коньячных домов, основан ирландцем Ричардом Хеннесси в 1765 году, который служил офицером во французской армии и остался во Франции после службы.","Самый продаваемый коньячный бренд в мире — надёжный, узнаваемый вкус.","Хорош со льдом или чистым."],["cognac","Хеннесси ХО","7150","коньяк XO","чистым","Топовая выдержанная линейка того же дома Hennessy; именно Hennessy в 1870-х впервые ввёл саму классификацию VS/VSOP/XO, которую позже переняла вся коньячная индустрия.","Максимальная выдержка линейки — самый сложный вкус дома в карте.","Подавайте медленно, дайте гостю время для дегустации без спешки."],["rum","Оакхарт Ориджинал","780","карибский ром","со льдом/в коктейль","Базовый карибский ром, купажированный из разных выдержек для стабильного, узнаваемого вкуса.","Универсальная, самая доступная позиция раздела.","Хорош со льдом или в коктейле."],["rum","Плантейшн 3","1150","карибский купажированный ром","чистым/в коктейль","Plantation — французская марка, купажирует ром нескольких карибских островов и практикует «двойное созревание»: ром сначала выдерживается в тропиках у себя на родине, а затем довыдерживается во Франции, где более прохладный климат замедляет процесс.","Купаж нескольких происхождений — более сложный, чем ром одного острова.","Хорош чистым или в коктейле."],["rum","Дипломатико Резерва","1690","венесуэльский ром","чистым","Diplomático из Венесуэлы известен сладким, насыщенным профилем; ром производят на бывшем заводе рома Pampero одни из лучших мастеров-ромоделов Латинской Америки.","Солера-метод даёт выраженную карамельную сладость — ённых дубовых бочках.","Самая тёмная и насыщенная позиция сейшельской линейки.","Подавайте чистым, как дижестив."],["vodka","Медофф Силк","670","российская водка","рюмка","Российская водка линейки Медофф с многоступенчатой фильтрацией через уголь.","Доступная позиция среднего сегмента.","Подавайте охлаждённой."],["vodka","Чайковский","590","российская водка","рюмка","Российская водка, названная в честь композитора Петра Чайковского — использование имён деятелей культуры на этикетках водки давняя маркетинговая традиция в России.","Классический профиль без выраженных особенностей.","Подавайте охлаждённой."],["vodka","Мамонт","790","сибирская водка","рюмка","Российская водка линейки «Мамонт», позиционируется на основе сибирской артезианской воды.","Сибирская вода как часть позиционирования бренда.","Подавайте охлаждённой."],["vodka","Грей Гуз","960","французская водка","рюмка","Grey Goose создана в 1997 году американским предпринимателем и производится в регионе Коньяк из французской мягкой озимой пшеницы, а вода для купажирования берётся из источника в Жансаке, известного своей мягкостью.","Мягче большинства позиций карты за счёт мягкой пшеницы и деликатной, пятикратной дистилляции.","Подавайте охлаждённой, чистой."],["vodka","Спельта","1690","водка из полбы","рюмка","Изготовлена из спельты (полбы) — древнего злака, предшественника современной пшеницы, который почти не подвергался селекции за тысячи лет и сохраняет более сложный вкус зерна.","Единственная водка карты из полбы — заметен более сладковатый зерновой шлейф, чем у пшеничных или ржаных водок.","Подавайте охлаждённой."],["vodka","Белуга Нобл","890","российская премиальная водка","рюмка","Beluga производится на Мариинском заводе в Сибири, известном одним из старейших в стране циклов производства, включающим длительный отдых спирта.","Премиальный сибирский профиль, мягче базовых позиций карты.","Подавайте охлаждённой, в рюмке."],["vodka","Белуга Голд Лайн","2190","российская премиальная водка","рюмка","Топовая линейка того же сибирского производителя Beluga — каждая бутылка проходит проверку экспертной дегустационной комиссией перед выпуском, как в производстве коллекционных вин.","Самая мягкая и дорогая позиция бренда в карте.","Подавайте охлаждённой, с особым вниманием к подаче."],["gin","Эдинбург Классик","1390","шотландский джин","с тоником","Классический лондон-драй стиль от шотландского производителя из Эдинбурга — несмотря на имя стиля «лондон драй», термин обозначает технологию, а не географию: делать такой джин можно где угодно.","Чёткая доминанта можжевельника без дополнительных смягчающих ботаников.","Подавайте с тоником."],["gin","Би Джин Лондон Драй / Флейворд","750","российский джин","с тоником","Джин линейки «Би Джин», доступен в классическом и ароматизированных вариантах.","Есть выбор между классикой и ароматизированной версией — уточните у гостя предпочтение.","Подавайте с тоником."],["gin","Босфорд","650","испанский джин","с тоником","Испанский джин с мягким, слегка сладковатым профилем — Испания, вопреки стереотипам, один из крупнейших в мире рынков потребления джин-тоника, там существует целая культура подачи в огромных бокалах-баллонах.","Менее резкий можжевельник, чем в классическом лондон-драй.","Подавайте с тоником."],["gin","Бомбей Сапфир","1190","английский джин","с тоником, лимоном","Bombay Sapphire дистиллируют методом пара через корзину с десятью ботаниками (включая миндаль, кубеб и райское зерно), подвешенную над спиртом — пар проходит сквозь неё, забирая ароматы без прямого контакта спирта с травами.","Более цветочный и лёгкий, чем классический лондон-драй, за счёт паровой дистилляции.","Подавайте с тоником и лимоном."],["gin","Брум Драй Джин","750","шотландский джин","с тоником","Классический сухой стиль джина шотландского производства.","Прямой, без нетипичных добавок классический профиль.","Подавайте с тоником."],["gin","Бульдог Лондон Драй","1490","лондонский джин","с тоником","Bulldog добавляет в рецептуру азиатские ботаники — лотос и драгон фрут, а узнаваемая чёрная бутылка с шипастым ошейником — фирменный визуальный ход бренда.","Азиатские ботаники делают его нетипичным для классического лондон-драй.","Подавайте с тоником."],["gin","Року джин","2150","японский джин","чистым или с тоником","Roku от японского дома Suntory использует шесть японских ботаников — сакуру, юдзу, санщо (японский перец) и другие; каждый ботаник дистиллируется отдельно, чтобы сохранить его собственный характер, а потом купажируется.","Самый нетипичный джин карты — совсем другой профиль, чем европейские позиции рядом, с цветочной и цитрусовой японской нотой вместо доминанты можжевельника.","Подавайте чистым или с тоником, подчёркивая ботанику."],["gin","Хендрикc","2550","шотландский джин","с огурцом","Hendrick's отличается добавлением дистиллятов огурца и лепестков болгарской розы в классическую можжевеловую основу — рецепт создали специально, чтобы выделиться на фоне сотен традиционных лондон-драй джинов.","Самый узнаваемый «нестандартный» джин карты благодаря огурцу и розе.","Подавайте с огурцом вместо цитруса — фирменная подача бренда."],["tequila","Эсполон Репосадо","1590","текила репосадо","чистым/в коктейль","Espolòn из Халиско известен ярким оформлением этикетки в стиле мексиканского Дня мёртвых (Día de los Muertos) — художник Ральф Стедман создавал рисунок скелета специально для бренда.","Мягче, чем Эсполон Бланко, за счёт выдержки в дубе (обычно от 2 до 12 месяцев по категории репосадо, «отдохнувшая»).","Подавайте чистым или в коктейле."],["tequila","Эсполон Кристалино","3090","текила кристалино","чистым","Выдержанная текила, дополнительно фильтрованная через угольные фильтры до полной прозрачности того же дома Espolòn — стиль кристалино возник в 2010-х как попытка получить сложность выдержанной текилы, сохранив вид бланко.","Сочетает вкус выдержанной текилы с видом бланко — необычная для категории комбинация.","Подавайте чистым."],["tequila","Хосе Куэрво 1800 Кристалино Аньехо","2450","текила аньехо","чистым","José Cuervo — старейший производитель текилы, история с 1795 года, первым в мире начал экспортировать текилу в бутылках, а не бочками; линейка 1800 названа в честь юбилея дома.","Самая долгая выдержка (аньехо, от 1 года) в сочетании с фильтрацией до прозрачности.","Подавайте чистым."],["tequila","Эль Текиленьо Бланко","1190","текила бланко","в коктейль/шот","Семейное производство из Халиско, работает с 1959 года — один из немногих небольших семейных заводов, до сих пор использующих традиционную каменную печь (horno) для варки агавы вместо промышленных автоклавов.","Чистый, невыдержанный вкус агавы — классика для Маргариты.","Хороша в коктейле или как шот с солью и лаймом."],["tequila","Эль Текиленьо Репосадо","1990","текила репосадо","чистым","Выдержанная позиция того же семейного производителя Эль Текиленьо.","Мягче Бланко того же производителя за счёт выдержки в дубе.","Подавайте чистым."],["tequila","Эсполон Бланко","1490","текила бланко","в коктейль","Базовая невыдержанная линейка дома Espolòn — 100% голубая агава, дистиллируется дважды в медных кубах.","Чистый вкус агавы без выдержки.","Хорошая основа для классических текиловых коктейлей."],["tequila","Мескаль Геррэро Майя Ховен","1750","мескаль","чистым","Мескаль из региона Герреро; агаву традиционно обжигают в конусообразных земляных ямах на раскалённых камнях в течение нескольких суток, что и даёт характерный дымный вкус — принципиально другая, более древняя технология, чем варка агавы паром для текилы.","Дымный вкус совсем не похож на текилу — не путать эти две категории при рекомендации: текила делается только из голубой агавы и только в определённых штатах Мексики, мескаль — из десятков разных видов агавы почти по всей стране.","Подавайте чистым, медленно, предупредив гостя о дыме."],["tequila","Патрон Сильвер","1590","текила бланко","чистым/в коктейль","Patrón — премиальная текила из вручную собранной агавы Халиско, основана в 1989 году; каждая бутылка нумеруется, а сама марка одной из первых в 1990-х сделала текилу «премиальным» напитком, а не только основой для шотов и текила-бум.","Премиальная невыдержанная текила ручного сбора.","Подавайте чистым или в коктейле."],["tequila","Патрон Репосадо","1790","текила репосадо","чистым","Выдержанная линейка того же премиального дома Patrón, дозревает в дубовых бочках.","Мягче Сильвер за счёт выдержки в дубе.","Подавайте чистым."],["tequila","Дон Хулио Бланко","2350","текила бланко","чистым/в коктейль","Дом основал Хулио Гонсалес в 1942 году в Халиско — он первым в регионе начал разливать текилу в собственные фирменные бутылки, а не продавать бочками местным барам.","Чистый, современный профиль голубой агавы.","Подавайте чистым или в коктейле."],["tequila","Дон Хулио 1942","7200","текила аньехо","чистым","Выдержанная юбилейная линейка, названная в честь года основания дома и выпущенная к его 50-летию в 1990-х; культовая позиция, часто фигурирующая в хип-хоп культуре США как символ статуса.","Топовая выдержанная (аньехо) позиция дома — самая мягкая и сложная, с нотами карамели и ванили от бочки.","Подавайте только чистым."],["tequila","Класе Азул Плата","6900","текила бланко","чистым","Clase Azul разливается в фирменные расписные керамические бутылки ручной работы из Халиско — каждую бутылку расписывают вручную мексиканские мастера-керамисты, и двух одинаковых практически не бывает.","Невыдержанная, но в премиальной ручной керамике — ценность не только во вкусе, но и в самом предмете, который часто оставляют себе как сувенир.","Подавайте чистым, подчёркивая ручную роспись бутылки."],["tequila","Класе Азул Репосадо","8500","текила репосадо","чистым","Выдержанная версия той же премиальной линейки, также в расписной керамической бутылке.","Выдержка добавляет мягкости к премиальному профилю бренда.","Подавайте чистым."],["tequila","Мескаль Класе Азул Дуранго / Герреро / Сан Луис Потоси","15500","коллекционный мескаль","чистым","Коллекционная линейка мескаля от Clase Azul из трёх разных мескальных регионов Мексики — каждый штат работает с собственным диким видом агавы и своей традицией обжига, поэтому вкус существенно различается даже в пределах одной марки.","Самая редкая и дорогая позиция всей карты — три региона с разным профилем дымности.","Подавайте чистым, медленная дегустационная подача, объясните гостю разницу регионов."]]}`;

function itemToObj(row) {
  const [cat, name, price, ingr, style, taste, fact, why] = row;
  return { cat, name, price, ingr, style, taste, fact, why, isCocktail: catMap[cat].type === "c", photo: FEATURED_PHOTOS[name] || null };
}

const ITEMS = D.map(itemToObj);

const counts = {};
ITEMS.forEach(it => { counts[it.cat] = (counts[it.cat] || 0) + 1; });

function normalize(s) {
  return (s || "").toLowerCase();
}

function cap(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const FALLBACK_STYLES = ["Рюмка", "Рокс", "Хайбол", "Бокал для вина", "Купе", "Со льдом", "Чистым"];

function styleQuestion(item, poolFilter, questionText) {
  const pool = shuffle(ITEMS.filter(x => poolFilter(x) && cap(x.style) !== cap(item.style)));
  let distractors = [...new Set(pool.map(x => cap(x.style)))].slice(0, 3);
  if (distractors.length < 3) {
    const filler = FALLBACK_STYLES.filter(s => s !== cap(item.style) && !distractors.includes(s));
    distractors = [...distractors, ...filler].slice(0, 3);
  }
  return {
    item, type: "style",
    question: questionText,
    options: shuffle([cap(item.style), ...distractors]),
    correct: cap(item.style),
  };
}

function tasteQuestion(item) {
  const pool = shuffle(ITEMS.filter(x => x.isCocktail && x.taste !== item.taste));
  const distractors = [...new Set(pool.map(x => x.taste))].slice(0, 3);
  return {
    item, type: "taste",
    question: `Какой вкусовой профиль у «${item.name}»?`,
    options: shuffle([item.taste, ...distractors]),
    correct: item.taste,
  };
}

function buildQuestion(item) {
  if (item.isCocktail) {
    // cocktails: either taste profile or serving glass
    if (Math.random() < 0.5) return tasteQuestion(item);
    return styleQuestion(item, x => x.isCocktail, `В какой посуде подают «${item.name}»?`);
  }
  // spirits: one short serving question
  return styleQuestion(item, x => !x.isCocktail, `Как подают «${item.name}»?`);
}

function generateQuiz(n = 12) {
  return shuffle(ITEMS).slice(0, n).map(buildQuestion);
}

        </div>
        <div className="pt-tab-wrap">
          <button className={"pt-tab" + (tab === "favorites" ? " active" : "")} onClick={() => setTab("favorites")}>
            <BookmarkCheck size={19} />
            {favoriteItems.length > 0 && <span className="badge">{favoriteItems.length}</span>}
            <span>Избранное</span>
          </button>
        </div>
      </div>

      {detailItem && (
        <div className="pt-sheet-backdrop" onClick={closeDetail}>
          <div className="pt-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="pt-sheet-handle"><div className="bar" /></div>
            <div className="pt-sheet-topbar">
              <button className="pt-sheet-nav-btn" disabled={detailIndex === 0} onClick={() => goDetail(-1)}>
                <ChevronLeft size={17} />
              </button>
              <span className="pt-sheet-counter">{detailIndex + 1} из {detailList.length}</span>
              <button className="pt-sheet-nav-btn" disabled={detailIndex === detailList.length - 1} onClick={() => goDetail(1)}>
                <ChevronRight size={17} />
              </button>
              <button className="pt-sheet-close" onClick={closeDetail}><X size={20} /></button>
            </div>
            <div className="pt-sheet-body">
              <div className="pt-index-card">
                {detailItem.photo && <img className="pt-detail-photo" src={detailItem.photo} alt={detailItem.name} />}
                <div className="pt-index-top">
                  <h2>{detailItem.name}</h2>
                  <button
                    className={"pt-fav-btn" + (favorites.has(detailItem.name) ? " active" : "")}
                    onClick={() => toggleFavorite(detailItem.name)}
                  >
                    <Heart size={18} />
                  </button>
                </div>
                <div className="pt-index-price">{detailItem.price} ₽</div>
                <div className="pt-index-ingr">{cap(detailItem.ingr)}</div>
                <div className="pt-index-style">
                  {detailItem.isCocktail ? "Подача: " : ""}{cap(detailItem.style)}
                </div>

                <div className="pt-cue-list">
                  {detailItem.isCocktail ? (
                    <>
                      <div className="pt-cue">
                        <div className="pt-cue-label taste">Вкус</div>
                        <div className="pt-cue-text">{detailItem.taste}</div>
                      </div>
                      <div className="pt-cue">
                        <div className="pt-cue-label fact">Факт</div>
                        <div className="pt-cue-text">{detailItem.fact}</div>
                      </div>
                      <div className="pt-cue">
                        <div className="pt-cue-label why">Кому предлагать</div>
                        <div className="pt-cue-text">{detailItem.why}</div>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="pt-cue">
                        <div className="pt-cue-label fact">Факт</div>
                        <div className="pt-cue-text">{detailItem.taste}</div>
                      </div>
                      <div className="pt-cue">
                        <div className="pt-cue-label taste">Отличие</div>
                        <div className="pt-cue-text">{detailItem.fact}</div>
                      </div>
                      <div className="pt-cue">
                        <div className="pt-cue-label why">Подача</div>
                        <div className="pt-cue-text">{detailItem.why}</div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultCard({ item, catTitle, hideCat, onClick }) {
  return (
    <div className="pt-result-card" onClick={onClick}>
      <div className="pt-result-top">
        <h3>{item.name}</h3>
        <span className="pt-result-price">{item.price} ₽</span>
      </div>
      <div className="pt-result-ingr">{cap(item.ingr)}</div>
      {!hideCat && catTitle && <div className="pt-result-cat">{catTitle}</div>}
    </div>
  );
}

function CatRow({ cat, count, onClick }) {
  return (
    <div className="pt-cat-list-item" onClick={onClick}>
      <div className="left">
        <h3>{cat.title}</h3>
        <p>{cat.sub}</p>
      </div>
      <div className="right">
        <span className="count">{count}</span>
        <ChevronRight size={16} color="var(--muted)" />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PhantomApp />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
